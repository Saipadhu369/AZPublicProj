trigger:
- main

pool:
  name: Default   # Replace with your self-hosted agent pool name

steps:
- checkout: self   # Ensures your repo is cloned onto the agent

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet build MyApp/MyApp.csproj --configuration Release
  displayName: 'Build project'

- script: dotnet publish MyApp/MyApp.csproj -c Release -o $(Build.ArtifactStagingDirectory)
  displayName: 'Publish project'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'